name: Build DebugRec AC6
on:

  workflow_dispatch:
  #pull_request:
  #  branches: [main]
  push:
    branches: [main]

  #schedule:
  #  - cron: '00 20 * * 6'

jobs:
  CI:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Activate vcpkg
      uses: ARM-software/cmsis-actions/vcpkg@v1
      with:
        config: "./vcpkg-configuration.json"
        cache: "ModelNova"

    - name: Activate Arm tool license
      uses: ARM-software/cmsis-actions/armlm@v1

    - name: Initialize CMSIS pack root folder
      run: |
        cpackget init https://www.keil.com/pack/index.pidx
        cpackget update-index

    - name: Cache downloaded packs
      uses: actions/cache@v5
      with:
        key: ModelNova
        path: /home/runner/.cache/arm/packs/.Download

    - name: Build for target-set for ULinkPlus with AC6 Compiler
      working-directory: ./RockPaperScissors/AppKit-E8_USB
      run: |
        cbuild SDS.csolution.yml --active AppKit-E8-U85@TS_ULP --packs

    - name: Upload output for target set AppKit-E8-U85@TS_ULP 
      uses: actions/upload-artifact@v7
      with:
        name: DebugPlay_AC6_ULPlus
        path: |
          ./RockPaperScissors/AppKit-E8_USB/out
